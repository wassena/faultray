<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0e1a"/>
  <!-- Upper grid (minimal) -->
  <g opacity="0.18">
    <line x1="10" y1="0" x2="10" y2="32" stroke="#e2e8f0" stroke-width="0.8"/>
    <line x1="20" y1="0" x2="20" y2="32" stroke="#e2e8f0" stroke-width="0.8"/>
    <line x1="0" y1="10" x2="32" y2="10" stroke="#e2e8f0" stroke-width="0.8"/>
    <line x1="0" y1="20" x2="32" y2="20" stroke="#e2e8f0" stroke-width="0.8"/>
  </g>
  <!-- Fault line glow -->
  <line x1="0" y1="20" x2="20" y2="0" stroke="#FFD700" stroke-width="4" opacity="0.2" stroke-linecap="round"/>
  <!-- Fault line -->
  <line x1="0" y1="20" x2="20" y2="0" stroke="#FFD700" stroke-width="1.8" stroke-linecap="round"/>
</svg>
