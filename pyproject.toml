[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "infrasim"
version = "0.1.0"
description = "Virtual infrastructure chaos engineering simulator"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.15",
    "rich>=13.0",
    "pydantic>=2.0",
    "networkx>=3.0",
    "psutil>=6.0",
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "jinja2>=3.1",
    "httpx>=0.28",
    "pyyaml>=6.0",
    "sqlalchemy>=2.0",
    "aiosqlite>=0.20",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.8",
]

[project.scripts]
infrasim = "infrasim.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/infrasim"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
