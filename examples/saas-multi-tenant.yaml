# ChaosProof - SaaS Multi-Tenant Infrastructure
#
# SOC2 compliant multi-tenant SaaS platform
# Load with:
#   chaosproof load examples/saas-multi-tenant.yaml
#
# Architecture:
#   CloudFront -> ALB -> Tenant Router -> API (x4)
#   -> PostgreSQL (Primary + 2 Replicas) + Redis (x2) + Kafka
#   -> S3 + Worker (x2)

components:
  - id: cloudfront
    name: "CloudFront CDN"
    type: load_balancer
    host: cdn.saas.example.com
    port: 443
    replicas: 2
    capacity:
      max_connections: 100000
      max_rps: 200000
    metrics:
      cpu_percent: 6
      memory_percent: 10
    security:
      encryption_in_transit: true
      waf_protected: true
      rate_limiting: true
      log_enabled: true
    compliance_tags:
      data_classification: public
      audit_logging: true
    tags:
      - edge
      - soc2

  - id: alb
    name: "Application Load Balancer"
    type: load_balancer
    host: alb.saas.internal
    port: 443
    replicas: 2
    capacity:
      max_connections: 50000
      max_rps: 80000
      timeout_seconds: 30.0
    metrics:
      cpu_percent: 15
      memory_percent: 18
      network_connections: 8000
    autoscaling:
      enabled: true
      min_replicas: 2
      max_replicas: 4
      scale_up_threshold: 70.0
      scale_down_threshold: 25.0
    failover:
      enabled: true
      promotion_time_seconds: 10.0
      health_check_interval_seconds: 5.0
      failover_threshold: 3
    security:
      encryption_in_transit: true
      waf_protected: true
      rate_limiting: true
      log_enabled: true
    compliance_tags:
      data_classification: internal
      audit_logging: true
    region:
      region: us-east-1
      availability_zone: us-east-1a
      is_primary: true
      dr_target_region: us-west-2
      rpo_seconds: 0
      rto_seconds: 30
    tags:
      - soc2

  - id: tenant-router
    name: "Tenant Router"
    type: app_server
    host: router.saas.internal
    port: 8080
    replicas: 3
    capacity:
      max_connections: 30000
      max_rps: 50000
      timeout_seconds: 5.0
      max_memory_mb: 4096
    metrics:
      cpu_percent: 20
      memory_percent: 25
      disk_percent: 5
      network_connections: 5000
    autoscaling:
      enabled: true
      min_replicas: 3
      max_replicas: 10
      scale_up_threshold: 55.0
      scale_down_threshold: 20.0
      scale_up_delay_seconds: 10
    failover:
      enabled: true
      promotion_time_seconds: 5.0
      health_check_interval_seconds: 3.0
      failover_threshold: 2
    security:
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
      rate_limiting: true
      log_enabled: true
    compliance_tags:
      data_classification: confidential
      contains_pii: true
      audit_logging: true
      change_management: true
    slo_targets:
      - name: router-availability
        metric: availability
        target: 99.99
        unit: percent
        window_days: 30
      - name: router-latency
        metric: latency_p99
        target: 50.0
        unit: ms
        window_days: 30
    tags:
      - soc2
      - routing
      - critical
    parameters:
      tenant_isolation: "row-level"
      max_tenants: 10000

  - id: api-1
    name: "API Server 1"
    type: app_server
    host: api01.saas.internal
    port: 8080
    replicas: 3
    capacity:
      max_connections: 5000
      connection_pool_size: 400
      timeout_seconds: 15.0
      max_memory_mb: 8192
    metrics:
      cpu_percent: 40
      memory_percent: 45
      disk_percent: 10
      network_connections: 1000
    autoscaling:
      enabled: true
      min_replicas: 3
      max_replicas: 12
      scale_up_threshold: 60.0
      scale_down_threshold: 20.0
      scale_up_delay_seconds: 15
    failover:
      enabled: true
      promotion_time_seconds: 10.0
      health_check_interval_seconds: 5.0
    security:
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
      log_enabled: true
    compliance_tags:
      data_classification: confidential
      contains_pii: true
      audit_logging: true
      change_management: true
    cost_profile:
      hourly_infra_cost: 1.50
      revenue_per_minute: 80.0
    slo_targets:
      - name: api-availability
        metric: availability
        target: 99.95
        unit: percent
        window_days: 30
    region:
      region: us-east-1
      availability_zone: us-east-1a
      is_primary: true
    tags:
      - soc2
      - api

  - id: api-2
    name: "API Server 2"
    type: app_server
    host: api02.saas.internal
    port: 8080
    replicas: 3
    capacity:
      max_connections: 5000
      connection_pool_size: 400
      timeout_seconds: 15.0
      max_memory_mb: 8192
    metrics:
