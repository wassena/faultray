    type: app_server
    host: api04.saas.internal
    port: 8080
    replicas: 3
    capacity:
      max_connections: 5000
      connection_pool_size: 400
      timeout_seconds: 15.0
      max_memory_mb: 8192
    metrics:
      cpu_percent: 33
      memory_percent: 38
      disk_percent: 10
      network_connections: 850
    autoscaling:
      enabled: true
      min_replicas: 3
      max_replicas: 12
      scale_up_threshold: 60.0
      scale_down_threshold: 20.0
    failover:
      enabled: true
