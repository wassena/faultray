    weight: 0.9
    protocol: tcp
    latency_ms: 0.5

  - source: api-1
    target: postgres-primary
    type: requires
    weight: 1.0
    protocol: tcp
    latency_ms: 2.0
    retry_strategy:
      enabled: true
      max_retries: 3
      initial_delay_ms: 100.0
      max_delay_ms: 5000.0

  - source: api-2
    target: postgres-primary
    type: requires
    weight: 1.0
