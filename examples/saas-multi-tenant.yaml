      enabled: true
      promotion_time_seconds: 5.0
      health_check_interval_seconds: 3.0
    cache_warming:
      enabled: true
      initial_hit_ratio: 0.1
      warm_duration_seconds: 300
      warming_curve: linear
    security:
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
      log_enabled: true
    compliance_tags:
      data_classification: internal
    tags:
      - cache

  - id: kafka
    name: "Kafka Event Stream"
    type: queue
    host: kafka.saas.internal
    port: 9092
    replicas: 3
    capacity:
      max_connections: 10000
      max_rps: 100000
    metrics:
      cpu_percent: 30
      memory_percent: 55
      disk_percent: 45
      network_connections: 1000
    failover:
      enabled: true
      promotion_time_seconds: 10.0
      health_check_interval_seconds: 5.0
      failover_threshold: 3
    security:
