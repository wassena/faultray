    replicas: 3
    capacity:
      max_connections: 5000
      connection_pool_size: 400
      timeout_seconds: 15.0
      max_memory_mb: 8192
    metrics:
      cpu_percent: 35
      memory_percent: 40
      disk_percent: 10
      network_connections: 900
    autoscaling:
      enabled: true
      min_replicas: 3
      max_replicas: 12
      scale_up_threshold: 60.0
      scale_down_threshold: 20.0
    failover:
      enabled: true
      promotion_time_seconds: 10.0
    security:
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
      log_enabled: true
    compliance_tags:
      data_classification: confidential
