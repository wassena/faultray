  - id: redis-session
    name: "Redis Session Store"
    type: cache
    host: redis-session.saas.internal
    port: 6379
    replicas: 3
    capacity:
      max_connections: 20000
    metrics:
      cpu_percent: 15
      memory_percent: 55
      network_connections: 5000
    failover:
      enabled: true
      promotion_time_seconds: 5.0
      health_check_interval_seconds: 3.0
      failover_threshold: 2
    cache_warming:
      enabled: true
      initial_hit_ratio: 0.0
      warm_duration_seconds: 120
      warming_curve: exponential
    security:
      encryption_at_rest: true
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
      log_enabled: true
    compliance_tags:
      data_classification: confidential
      contains_pii: true
      audit_logging: true
    tags:
      - soc2
      - session
    parameters:
      tenant_isolation: "key-prefix"

  - id: redis-cache
    name: "Redis Data Cache"
    type: cache
    host: redis-cache.saas.internal
    port: 6379
    replicas: 3
    capacity:
      max_connections: 20000
    metrics:
      cpu_percent: 12
      memory_percent: 60
      network_connections: 4000
