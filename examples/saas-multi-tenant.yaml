  - id: postgres-primary
    name: "PostgreSQL Primary"
    type: database
    host: db-primary.saas.internal
    port: 5432
    replicas: 1
    capacity:
      max_connections: 1000
      max_disk_gb: 3000
    metrics:
      cpu_percent: 50
      memory_percent: 65
      disk_percent: 35
      network_connections: 400
    failover:
      enabled: true
      promotion_time_seconds: 30.0
      health_check_interval_seconds: 5.0
      failover_threshold: 2
    security:
      encryption_at_rest: true
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
      backup_enabled: true
      backup_frequency_hours: 1.0
      log_enabled: true
    compliance_tags:
      data_classification: restricted
      contains_pii: true
      audit_logging: true
      change_management: true
    cost_profile:
      hourly_infra_cost: 6.00
      data_loss_cost_per_gb: 15000.0
    operational_profile:
      mtbf_hours: 8760.0
