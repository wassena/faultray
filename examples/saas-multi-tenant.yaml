      audit_logging: true
    tags:
      - worker
      - async

dependencies:
  - source: cloudfront
    target: alb
    type: requires
    weight: 1.0
    protocol: https
    latency_ms: 1.0

  - source: alb
    target: tenant-router
    type: requires
    weight: 1.0
    protocol: http
    latency_ms: 1.0
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      recovery_timeout_seconds: 30.0

  - source: tenant-router
    target: api-1
    type: requires
    weight: 1.0
    protocol: http
    latency_ms: 2.0
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      recovery_timeout_seconds: 30.0

  - source: tenant-router
    target: api-2
    type: requires
    weight: 1.0
    protocol: http
    latency_ms: 2.0
    circuit_breaker:
      enabled: true
      failure_threshold: 5
