# ChaosProof - Fintech Banking Infrastructure
#
# DORA (Digital Operational Resilience Act) compliant banking system
# Load with:
#   chaosproof load examples/fintech-banking.yaml
#
# Architecture:
#   CloudFront CDN -> WAF -> API Gateway -> Core Banking APIs (x3)
#   -> PostgreSQL (Primary + Replica) + Redis Session Cache
#   -> Kafka Event Bus + S3 Document Store + KMS Encryption

components:
  - id: cloudfront-cdn
    name: "CloudFront CDN"
    type: load_balancer
    host: cdn.bank.example.com
    port: 443
    replicas: 2
    capacity:
      max_connections: 50000
      max_rps: 100000
    metrics:
      cpu_percent: 8
      memory_percent: 12
    failover:
      enabled: true
      promotion_time_seconds: 5.0
      health_check_interval_seconds: 5.0
      failover_threshold: 2
    security:
      encryption_at_rest: false
      encryption_in_transit: true
      waf_protected: true
      rate_limiting: true
      auth_required: false
      network_segmented: false
      log_enabled: true
    compliance_tags:
      data_classification: public
      pci_scope: false
      audit_logging: true
    region:
      region: eu-west-1
      availability_zone: eu-west-1a
      is_primary: true
      dr_target_region: eu-central-1
      rpo_seconds: 0
      rto_seconds: 30
    tags:
      - dora
      - edge

  - id: waf
    name: "AWS WAF"
    type: custom
    host: waf.bank.example.com
    port: 443
    replicas: 2
    capacity:
      max_connections: 50000
      max_rps: 80000
    metrics:
      cpu_percent: 5
      memory_percent: 10
    security:
      encryption_in_transit: true
      waf_protected: true
      rate_limiting: true
      log_enabled: true
      ids_monitored: true
    compliance_tags:
      data_classification: internal
      audit_logging: true
    tags:
      - dora
      - security

  - id: api-gateway
    name: "API Gateway"
    type: load_balancer
    host: api-gw.bank.internal
    port: 443
    replicas: 2
    capacity:
      max_connections: 20000
      max_rps: 30000
      timeout_seconds: 15.0
    metrics:
      cpu_percent: 18
      memory_percent: 22
    autoscaling:
      enabled: true
      min_replicas: 2
      max_replicas: 6
      scale_up_threshold: 60.0
      scale_down_threshold: 25.0
      scale_up_delay_seconds: 10
      scale_down_delay_seconds: 300
    failover:
      enabled: true
      promotion_time_seconds: 10.0
      health_check_interval_seconds: 5.0
      failover_threshold: 3
    security:
      encryption_in_transit: true
      waf_protected: true
      rate_limiting: true
      auth_required: true
      network_segmented: true
      log_enabled: true
    compliance_tags:
      data_classification: confidential
      pci_scope: true
      audit_logging: true
      change_management: true
    region:
      region: eu-west-1
      availability_zone: eu-west-1a
      is_primary: true
      dr_target_region: eu-central-1
      rpo_seconds: 0
      rto_seconds: 60
    tags:
      - dora
      - pci-dss

  - id: core-banking-api-1
    name: "Core Banking API 1"
    type: app_server
    host: banking01.internal
    port: 8443
    replicas: 3
    capacity:
      max_connections: 5000
      connection_pool_size: 500
      timeout_seconds: 10.0
      max_memory_mb: 8192
    metrics:
      cpu_percent: 35
      memory_percent: 42
      disk_percent: 15
      network_connections: 800
    autoscaling:
      enabled: true
      min_replicas: 3
      max_replicas: 10
      scale_up_threshold: 65.0
      scale_down_threshold: 20.0
      scale_up_delay_seconds: 15
    failover:
      enabled: true
      promotion_time_seconds: 15.0
      health_check_interval_seconds: 5.0
      failover_threshold: 3
    security:
      encryption_at_rest: true
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
      log_enabled: true
    compliance_tags:
      data_classification: restricted
      pci_scope: true
      contains_pii: true
      audit_logging: true
      change_management: true
    cost_profile:
      hourly_infra_cost: 2.50
      revenue_per_minute: 500.0
      sla_credit_percent: 10.0
    slo_targets:
      - name: banking-api-availability
        metric: availability
        target: 99.99
        unit: percent
        window_days: 30
      - name: banking-api-latency
        metric: latency_p99
        target: 200.0
        unit: ms
        window_days: 30
    region:
      region: eu-west-1
      availability_zone: eu-west-1a
      is_primary: true
      dr_target_region: eu-central-1
      rpo_seconds: 5
      rto_seconds: 120
    tags:
      - dora
      - pci-dss
      - core

  - id: core-banking-api-2
    name: "Core Banking API 2"
    type: app_server
    host: banking02.internal
    port: 8443
    replicas: 3
    capacity:
      max_connections: 5000
      connection_pool_size: 500
      timeout_seconds: 10.0
      max_memory_mb: 8192
    metrics:
      cpu_percent: 32
      memory_percent: 40
      disk_percent: 14
      network_connections: 750
    autoscaling:
      enabled: true
      min_replicas: 3
      max_replicas: 10
      scale_up_threshold: 65.0
      scale_down_threshold: 20.0
    failover:
      enabled: true
      promotion_time_seconds: 15.0
      health_check_interval_seconds: 5.0
      failover_threshold: 3
    security:
      encryption_at_rest: true
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
      log_enabled: true
    compliance_tags:
      data_classification: restricted
      pci_scope: true
      contains_pii: true
      audit_logging: true
      change_management: true
    region:
      region: eu-west-1
      availability_zone: eu-west-1b
      is_primary: true
    tags:
      - dora
      - pci-dss
      - core

  - id: core-banking-api-3
    name: "Core Banking API 3"
    type: app_server
    host: banking03.internal
    port: 8443
    replicas: 3
    capacity:
      max_connections: 5000
      connection_pool_size: 500
      timeout_seconds: 10.0
      max_memory_mb: 8192
    metrics:
      cpu_percent: 30
      memory_percent: 38
      disk_percent: 13
      network_connections: 700
    autoscaling:
      enabled: true
      min_replicas: 3
      max_replicas: 10
      scale_up_threshold: 65.0
      scale_down_threshold: 20.0
    failover:
      enabled: true
      promotion_time_seconds: 15.0
      health_check_interval_seconds: 5.0
      failover_threshold: 3
    security:
      encryption_at_rest: true
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
      log_enabled: true
    compliance_tags:
      data_classification: restricted
      pci_scope: true
      contains_pii: true
      audit_logging: true
      change_management: true
    region:
      region: eu-west-1
      availability_zone: eu-west-1c
      is_primary: true
    tags:
      - dora
      - pci-dss
      - core

  - id: postgres-primary
    name: "PostgreSQL Primary"
    type: database
    host: db-primary.bank.internal
    port: 5432
    replicas: 1
    capacity:
      max_connections: 500
      max_disk_gb: 2000
    metrics:
      cpu_percent: 45
      memory_percent: 60
      disk_percent: 35
      network_connections: 180
    failover:
      enabled: true
      promotion_time_seconds: 30.0
      health_check_interval_seconds: 5.0
      failover_threshold: 2
    security:
      encryption_at_rest: true
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
      backup_enabled: true
      backup_frequency_hours: 1.0
      log_enabled: true
    compliance_tags:
      data_classification: restricted
      pci_scope: true
      contains_pii: true
      audit_logging: true
      change_management: true
    cost_profile:
      hourly_infra_cost: 5.00
      data_loss_cost_per_gb: 10000.0
    operational_profile:
      mtbf_hours: 8760.0
      mttr_minutes: 30.0
      deploy_downtime_seconds: 0.0
    region:
      region: eu-west-1
      availability_zone: eu-west-1a
      is_primary: true
      dr_target_region: eu-central-1
      rpo_seconds: 5
      rto_seconds: 300
    tags:
      - dora
      - pci-dss
      - stateful

  - id: postgres-replica
    name: "PostgreSQL Replica"
    type: database
    host: db-replica.bank.internal
    port: 5432
    replicas: 2
    capacity:
      max_connections: 500
      max_disk_gb: 2000
    metrics:
      cpu_percent: 25
      memory_percent: 45
      disk_percent: 34
      network_connections: 120
    failover:
      enabled: true
      promotion_time_seconds: 30.0
      health_check_interval_seconds: 5.0
      failover_threshold: 2
    security:
      encryption_at_rest: true
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
      backup_enabled: true
      backup_frequency_hours: 1.0
      log_enabled: true
    compliance_tags:
      data_classification: restricted
      pci_scope: true
      contains_pii: true
      audit_logging: true
    region:
      region: eu-west-1
      availability_zone: eu-west-1b
      is_primary: false
    tags:
      - dora
      - pci-dss
      - stateful

  - id: redis-session
    name: "Redis Session Cache"
    type: cache
    host: redis-session.bank.internal
    port: 6379
    replicas: 3
    capacity:
      max_connections: 10000
    metrics:
      cpu_percent: 12
      memory_percent: 55
      network_connections: 2000
    autoscaling:
      enabled: false
    failover:
      enabled: true
      promotion_time_seconds: 5.0
      health_check_interval_seconds: 3.0
      failover_threshold: 2
    cache_warming:
      enabled: true
      initial_hit_ratio: 0.0
      warm_duration_seconds: 120
      warming_curve: exponential
    security:
      encryption_at_rest: true
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
      log_enabled: true
    compliance_tags:
      data_classification: confidential
      pci_scope: true
      audit_logging: true
    tags:
      - dora
      - session

  - id: kafka-event-bus
    name: "Kafka Event Bus"
    type: queue
    host: kafka.bank.internal
    port: 9092
    replicas: 3
    capacity:
      max_connections: 5000
      max_rps: 50000
    metrics:
      cpu_percent: 28
      memory_percent: 50
      disk_percent: 40
      network_connections: 500
    failover:
      enabled: true
      promotion_time_seconds: 10.0
      health_check_interval_seconds: 5.0
      failover_threshold: 3
    security:
      encryption_at_rest: true
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
      log_enabled: true
    compliance_tags:
      data_classification: confidential
      pci_scope: true
      audit_logging: true
    region:
      region: eu-west-1
      availability_zone: eu-west-1a
      is_primary: true
    tags:
      - dora
      - event-driven

  - id: s3-document-store
    name: "S3 Document Store"
    type: storage
    host: s3.eu-west-1.amazonaws.com
    port: 443
    replicas: 1
    capacity:
      max_disk_gb: 50000
    metrics:
      disk_percent: 20
    security:
      encryption_at_rest: true
      encryption_in_transit: true
      auth_required: true
      backup_enabled: true
      backup_frequency_hours: 24.0
      log_enabled: true
    compliance_tags:
      data_classification: restricted
      pci_scope: true
      contains_pii: true
      audit_logging: true
    tags:
      - dora
      - storage

  - id: kms-encryption
    name: "KMS Encryption Service"
    type: custom
    host: kms.eu-west-1.amazonaws.com
    port: 443
    replicas: 1
    capacity:
      max_rps: 10000
    metrics:
      cpu_percent: 5
    security:
      encryption_at_rest: true
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
      log_enabled: true
    compliance_tags:
      data_classification: restricted
      pci_scope: true
      audit_logging: true
      change_management: true
    tags:
      - dora
      - encryption
      - critical

dependencies:
  - source: cloudfront-cdn
    target: waf
    type: requires
    weight: 1.0
    protocol: https
    latency_ms: 1.0

  - source: waf
    target: api-gateway
    type: requires
    weight: 1.0
    protocol: https
    latency_ms: 2.0

  - source: api-gateway
    target: core-banking-api-1
    type: requires
    weight: 1.0
    protocol: https
    latency_ms: 3.0
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      recovery_timeout_seconds: 30.0
      half_open_max_requests: 3
      success_threshold: 2

  - source: api-gateway
    target: core-banking-api-2
    type: requires
    weight: 1.0
    protocol: https
    latency_ms: 3.0
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      recovery_timeout_seconds: 30.0

  - source: api-gateway
    target: core-banking-api-3
    type: requires
    weight: 1.0
    protocol: https
    latency_ms: 3.0
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      recovery_timeout_seconds: 30.0

  - source: core-banking-api-1
    target: postgres-primary
    type: requires
    weight: 1.0
    protocol: tcp
    latency_ms: 2.0
    retry_strategy:
      enabled: true
      max_retries: 3
      initial_delay_ms: 100.0
      max_delay_ms: 5000.0

  - source: core-banking-api-2
    target: postgres-primary
    type: requires
    weight: 1.0
    protocol: tcp
    latency_ms: 2.0
    retry_strategy:
      enabled: true
      max_retries: 3

  - source: core-banking-api-3
    target: postgres-primary
    type: requires
    weight: 1.0
    protocol: tcp
    latency_ms: 2.0
    retry_strategy:
      enabled: true
      max_retries: 3

  - source: core-banking-api-1
    target: postgres-replica
    type: optional
    weight: 0.6
    protocol: tcp
    latency_ms: 3.0

  - source: core-banking-api-2
    target: postgres-replica
    type: optional
    weight: 0.6
    protocol: tcp
    latency_ms: 3.0

  - source: core-banking-api-3
    target: postgres-replica
    type: optional
    weight: 0.6
    protocol: tcp
    latency_ms: 3.0

  - source: postgres-primary
    target: postgres-replica
    type: async
    weight: 0.8
    protocol: tcp
    latency_ms: 1.0

  - source: core-banking-api-1
    target: redis-session
    type: optional
    weight: 0.8
    protocol: tcp
    latency_ms: 0.5
    circuit_breaker:
      enabled: true
      failure_threshold: 3
      recovery_timeout_seconds: 15.0

  - source: core-banking-api-2
    target: redis-session
    type: optional
    weight: 0.8
    protocol: tcp
    latency_ms: 0.5

  - source: core-banking-api-3
    target: redis-session
    type: optional
    weight: 0.8
    protocol: tcp
    latency_ms: 0.5

  - source: core-banking-api-1
    target: kafka-event-bus
    type: async
    weight: 0.7
    protocol: tcp
    latency_ms: 5.0

  - source: core-banking-api-2
    target: kafka-event-bus
    type: async
    weight: 0.7
    protocol: tcp
    latency_ms: 5.0

  - source: core-banking-api-3
    target: kafka-event-bus
    type: async
    weight: 0.7
    protocol: tcp
    latency_ms: 5.0

  - source: core-banking-api-1
    target: s3-document-store
    type: optional
    weight: 0.5
    protocol: https
    latency_ms: 10.0

  - source: core-banking-api-1
    target: kms-encryption
    type: requires
    weight: 0.9
    protocol: https
    latency_ms: 5.0

  - source: core-banking-api-2
    target: kms-encryption
    type: requires
    weight: 0.9
    protocol: https
    latency_ms: 5.0

  - source: core-banking-api-3
    target: kms-encryption
    type: requires
    weight: 0.9
    protocol: https
    latency_ms: 5.0

  - source: postgres-primary
    target: kms-encryption
    type: requires
    weight: 0.9
    protocol: https
    latency_ms: 3.0

  - source: s3-document-store
    target: kms-encryption
    type: requires
    weight: 0.9
    protocol: https
    latency_ms: 3.0
