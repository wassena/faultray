# FaultRay - Example infrastructure definition
#
# Load with:
#   faultray load examples/demo-infra.yaml
#
# This describes a typical web application stack:
#   nginx (load balancer) -> app servers -> PostgreSQL + Redis + RabbitMQ

components:
  - id: nginx
    name: "nginx (LB)"
    type: load_balancer
    host: web01
    port: 443
    replicas: 2
    capacity:
      max_connections: 10000
      max_rps: 50000
    metrics:
      cpu_percent: 15
      memory_percent: 20
      disk_percent: 25
    cost_profile:
      revenue_per_minute: 5.0       # $300/hr — typical mid-size SaaS
      hourly_infra_cost: 15.0
      sla_credit_percent: 10.0

  - id: app-1
    name: "api-server-1"
    type: app_server
    host: app01
    port: 8080
    replicas: 3
    capacity:
      max_connections: 1000
      connection_pool_size: 200
      timeout_seconds: 30
      max_memory_mb: 4096
    metrics:
      cpu_percent: 22
      memory_percent: 25
      disk_percent: 22
      network_connections: 200

  - id: app-2
    name: "api-server-2"
    type: app_server
    host: app02
    port: 8080
    replicas: 3
    capacity:
      max_connections: 1000
      connection_pool_size: 200
      timeout_seconds: 30
      max_memory_mb: 4096
    metrics:
      cpu_percent: 20
      memory_percent: 24
      disk_percent: 20
      network_connections: 180

  - id: postgres
    name: "PostgreSQL (primary)"
    type: database
    host: db01
    port: 5432
    replicas: 2
    capacity:
      max_connections: 200
      max_disk_gb: 500
    metrics:
      cpu_percent: 20
      memory_percent: 26
    cost_profile:
      revenue_per_minute: 5.0       # DB serves same revenue stream
      hourly_infra_cost: 25.0
      disk_percent: 24
      network_connections: 40

  - id: redis
    name: "Redis (cache)"
    type: cache
    host: cache01
    port: 6379
    replicas: 2
    capacity:
      max_connections: 10000
    metrics:
      cpu_percent: 8
      memory_percent: 22
      network_connections: 100

  - id: rabbitmq
    name: "RabbitMQ"
    type: queue
    host: mq01
    port: 5672
    replicas: 2
    capacity:
      max_connections: 1000
    metrics:
      cpu_percent: 10
      memory_percent: 20
      disk_percent: 15
      network_connections: 25

dependencies:
  - source: nginx
    target: app-1
    type: requires
    weight: 1.0

  - source: nginx
    target: app-2
    type: requires
    weight: 1.0

  - source: app-1
    target: postgres
    type: requires
    weight: 1.0

  - source: app-2
    target: postgres
    type: requires
    weight: 1.0

  - source: app-1
    target: redis
    type: optional
    weight: 0.7

  - source: app-2
    target: redis
    type: optional
    weight: 0.7

  - source: app-1
    target: rabbitmq
    type: async
    weight: 0.5

  - source: app-2
    target: rabbitmq
    type: async
    weight: 0.5
