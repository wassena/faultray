# FaultRay Template: Basic Web Application
#
# Architecture: LB -> App Servers -> Database + Cache
# Use case: Standard web application with session caching
#
# Load with:
#   faultray template use web-app --output my-infra.yaml
#   faultray load my-infra.yaml

schema_version: "3.0"

components:
  - id: lb
    name: "Load Balancer (nginx)"
    type: load_balancer
    host: lb.web.internal
    port: 443
    replicas: 2
    capacity:
      max_connections: 20000
      max_rps: 50000
    metrics:
      cpu_percent: 12
      memory_percent: 15
      network_connections: 800
    failover:
      enabled: true
      promotion_time_seconds: 10
    security:
      encryption_in_transit: true
      waf_protected: true
      rate_limiting: true
      log_enabled: true
    cost_profile:
      hourly_infra_cost: 0.25
      revenue_per_minute: 50.0
    compliance_tags:
      data_classification: public
      audit_logging: true

  - id: app
    name: "Application Server"
    type: app_server
    host: app.web.internal
    port: 8080
    replicas: 3
    capacity:
      max_connections: 2000
      max_rps: 10000
      connection_pool_size: 200
      timeout_seconds: 30
      max_memory_mb: 4096
    metrics:
      cpu_percent: 35
      memory_percent: 45
      network_connections: 500
    autoscaling:
      enabled: true
      min_replicas: 2
      max_replicas: 8
      scale_up_threshold: 70
      scale_down_threshold: 30
    security:
      encryption_in_transit: true
      auth_required: true
      log_enabled: true
    cost_profile:
      hourly_infra_cost: 0.50
    compliance_tags:
      data_classification: internal

  - id: db
    name: "PostgreSQL Database"
    type: database
    host: db.web.internal
    port: 5432
    replicas: 2
    capacity:
      max_connections: 500
      max_disk_gb: 200
      max_memory_mb: 16384
    metrics:
      cpu_percent: 25
      memory_percent: 40
      disk_percent: 35
      network_connections: 120
    failover:
      enabled: true
      promotion_time_seconds: 30
      health_check_interval_seconds: 5
    security:
      encryption_at_rest: true
      encryption_in_transit: true
      backup_enabled: true
      backup_frequency_hours: 6
      network_segmented: true
      log_enabled: true
    cost_profile:
      hourly_infra_cost: 1.20
    compliance_tags:
      data_classification: confidential
      contains_pii: true
      audit_logging: true

  - id: cache
    name: "Redis Cache"
    type: cache
    host: cache.web.internal
    port: 6379
    replicas: 2
    capacity:
      max_connections: 10000
      max_memory_mb: 4096
    metrics:
      cpu_percent: 10
      memory_percent: 55
      network_connections: 300
    failover:
      enabled: true
      promotion_time_seconds: 5
    security:
      encryption_in_transit: true
      auth_required: true
      network_segmented: true
    cost_profile:
      hourly_infra_cost: 0.30

dependencies:
  - source: lb
    target: app
    type: requires
    protocol: http
    latency_ms: 1.0
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      recovery_timeout_seconds: 30

  - source: app
    target: db
    type: requires
    protocol: tcp
    port: 5432
    latency_ms: 2.0
    circuit_breaker:
      enabled: true
      failure_threshold: 3
      recovery_timeout_seconds: 60
    retry_strategy:
      enabled: true
      max_retries: 3
      initial_delay_ms: 100

  - source: app
    target: cache
    type: optional
    protocol: tcp
    port: 6379
    latency_ms: 0.5
    weight: 0.7
    circuit_breaker:
      enabled: true
      failure_threshold: 5
      recovery_timeout_seconds: 15
