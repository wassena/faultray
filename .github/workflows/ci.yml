name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly mutation testing — Sunday 02:00 UTC
    - cron: "0 2 * * 0"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: |
          pip install mypy types-PyYAML
          python -m mypy src/faultray/model/ --ignore-missing-imports

      - name: Run property-based tests
        run: pytest tests/test_property_based.py -v --tb=short

      - name: Run tests
        run: |
          pytest -v --tb=short --junitxml=test-results.xml 2>&1 | tee test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          echo ""
          echo "=========================================="
          echo "TEST SUMMARY"
          echo "=========================================="
          SUMMARY=$(grep -E "passed|failed|error" test-output.txt | tail -1)
          echo "$SUMMARY"
          echo "=========================================="

          # ② Test proof: SHA-256 hash of results
          PASSED=$(echo "$SUMMARY" | grep -oP '\d+ passed' | grep -oP '\d+' || echo "0")
          FAILED=$(echo "$SUMMARY" | grep -oP '\d+ failed' | grep -oP '\d+' || echo "0")
          TOTAL=$((PASSED + FAILED))
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          COMMIT=$(git rev-parse HEAD)
          echo "$PASSED passed, $FAILED failed, total $TOTAL at $TIMESTAMP commit $COMMIT" > test-proof.txt
          SHA256=$(sha256sum test-proof.txt | cut -d' ' -f1)
          echo "SHA256: $SHA256" >> test-proof.txt
          echo ""
          echo "═══════════════════════════════════════════"
          echo "  TEST PROOF (SHA-256 signed)"
          echo "═══════════════════════════════════════════"
          cat test-proof.txt
          echo "═══════════════════════════════════════════"

          exit $EXIT_CODE

      # ④ Test count regression guard
      - name: Test count regression guard
        if: matrix.python-version == '3.12'
        run: |
          CURRENT=$(grep -oP '\d+ passed' test-output.txt | grep -oP '\d+' || echo "0")
          MIN_TESTS=31000
          echo "Current: $CURRENT / Minimum: $MIN_TESTS"
          if [ "$CURRENT" -lt "$MIN_TESTS" ]; then
            echo "❌ TEST COUNT REGRESSION: $CURRENT < $MIN_TESTS"
            exit 1
          fi
          echo "✅ Test count OK"

      # ② Upload test proof artifacts
      - name: Upload test proof
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: test-proof-${{ github.sha }}
          path: |
            test-proof.txt
            test-output.txt
            test-results.xml
          retention-days: 90

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          pip install pytest-cov
          pytest --cov=faultray --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  e2e:
    name: Real E2E Tests (no mocks)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run real E2E tests (275 tests, no mocks)
        run: |
          pytest tests/test_real_e2e.py \
                 tests/test_real_e2e_cli.py \
                 tests/test_real_e2e_engines.py \
                 tests/test_real_e2e_governance.py \
                 -v --tb=short --junitxml=e2e-results.xml 2>&1 | tee e2e-output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          echo ""
          echo "=========================================="
          echo "E2E TEST SUMMARY"
          echo "=========================================="
          SUMMARY=$(grep -E "passed|failed|error" e2e-output.txt | tail -1)
          echo "$SUMMARY"

          PASSED=$(echo "$SUMMARY" | grep -oP '\d+ passed' | grep -oP '\d+' || echo "0")
          echo "E2E tests passed: $PASSED"
          echo "=========================================="

          exit $EXIT_CODE

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.sha }}
          path: |
            e2e-results.xml
            e2e-output.txt
          retention-days: 30

  performance:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run performance benchmarks
        # Threshold violations are reported but do NOT fail the build (continue-on-error)
        continue-on-error: true
        run: pytest tests/test_perf_benchmarks.py -v --tb=short

  mutation:
    runs-on: ubuntu-latest
    # Run only on the weekly schedule trigger, not on every push/PR
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mutmut

      - name: Run mutation testing (core modules)
        # Config is read from [tool.mutmut] in pyproject.toml
        # paths_to_mutate covers model/, simulator/engine.py, simulator/cascade.py
        run: python3 -m mutmut run
        continue-on-error: true

      - name: Show mutation results
        if: always()
        run: python3 -m mutmut results

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit safety bandit

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit --strict --desc 2>&1 || true

      - name: Secret detection
        run: |
          echo "Scanning for hardcoded secrets..."
          FOUND=0
          for PATTERN in 'sk_test_' 'sk_live_' 'ghp_' 'github_pat_' 'AKIA' 'GOCSPX-'; do
            if grep -rn "$PATTERN" src/ tests/ --include='*.py' 2>/dev/null; then
              echo "❌ Found potential secret: $PATTERN"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "✅ No hardcoded secrets found"
          else
            exit 1
          fi

      - name: Bandit security linter
        run: bandit -r src/faultray/ -ll --skip B101 -f json -o bandit-report.json || true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.sha }}
          path: bandit-report.json
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t faultray:test .

      - name: Test Docker image
        run: docker run --rm faultray:test faultray --help
