name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly mutation testing — Sunday 02:00 UTC
    - cron: "0 2 * * 0"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: |
          pip install mypy types-PyYAML
          python -m mypy src/faultray/model/ --ignore-missing-imports

      - name: Run property-based tests
        run: pytest tests/test_property_based.py -v --tb=short

      - name: Run tests
        run: |
          pytest -v --tb=short 2>&1 | tee test-output.txt
          echo ""
          echo "=========================================="
          echo "TEST SUMMARY"
          echo "=========================================="
          grep -E "^(FAILED|PASSED|ERROR|=)" test-output.txt | tail -5
          echo "=========================================="
          exit ${PIPESTATUS[0]}

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          pip install pytest-cov
          pytest --cov=faultray --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  performance:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run performance benchmarks
        # Threshold violations are reported but do NOT fail the build (continue-on-error)
        continue-on-error: true
        run: pytest tests/test_perf_benchmarks.py -v --tb=short

  mutation:
    runs-on: ubuntu-latest
    # Run only on the weekly schedule trigger, not on every push/PR
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mutmut

      - name: Run mutation testing (core modules)
        # Config is read from [tool.mutmut] in pyproject.toml
        # paths_to_mutate covers model/, simulator/engine.py, simulator/cascade.py
        run: python3 -m mutmut run
        continue-on-error: true

      - name: Show mutation results
        if: always()
        run: python3 -m mutmut results

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t faultray:test .

      - name: Test Docker image
        run: docker run --rm faultray:test faultray --help
