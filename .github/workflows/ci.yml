name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: |
          pip install mypy
          python -m mypy src/faultray/model/ --ignore-missing-imports

      - name: Run property-based tests
        run: |
          pip install hypothesis
          pytest tests/test_property_based.py -v --tb=short

      - name: Run tests
        run: |
          pytest -v --tb=short 2>&1 | tee test-output.txt
          echo ""
          echo "=========================================="
          echo "TEST SUMMARY"
          echo "=========================================="
          grep -E "^(FAILED|PASSED|ERROR|=)" test-output.txt | tail -5
          echo "=========================================="
          exit ${PIPESTATUS[0]}

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          pip install pytest-cov
          pytest --cov=faultray --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t faultray:test .

      - name: Test Docker image
        run: docker run --rm faultray:test faultray --help
