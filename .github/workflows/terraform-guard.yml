name: FaultRay Terraform Guard

on:
  workflow_call:
    inputs:
      terraform-dir:
        description: 'Directory containing Terraform configuration'
        required: false
        type: string
        default: '.'
      terraform-version:
        description: 'Terraform version to use'
        required: false
        type: string
        default: '1.7.0'
      min-score:
        description: 'Minimum resilience score threshold (0-100)'
        required: false
        type: number
        default: 60
      fail-on-regression:
        description: 'Fail the check if resilience score drops vs baseline'
        required: false
        type: boolean
        default: true
      comment-on-pr:
        description: 'Post analysis results as a PR comment'
        required: false
        type: boolean
        default: true
      faultray-version:
        description: 'FaultRay version to install (empty = latest)'
        required: false
        type: string
        default: ''
    secrets:
      TF_API_TOKEN:
        description: 'Terraform Cloud API token (optional)'
        required: false
      AWS_ACCESS_KEY_ID:
        description: 'AWS credentials for Terraform plan (optional)'
        required: false
      AWS_SECRET_ACCESS_KEY:
        description: 'AWS credentials for Terraform plan (optional)'
        required: false
      GOOGLE_CREDENTIALS:
        description: 'GCP credentials for Terraform plan (optional)'
        required: false
      ARM_CLIENT_ID:
        description: 'Azure credentials for Terraform plan (optional)'
        required: false
      ARM_CLIENT_SECRET:
        description: 'Azure credentials for Terraform plan (optional)'
        required: false
      ARM_SUBSCRIPTION_ID:
        description: 'Azure credentials for Terraform plan (optional)'
        required: false
      ARM_TENANT_ID:
        description: 'Azure credentials for Terraform plan (optional)'
        required: false
    outputs:
      resilience-score:
        description: 'Post-change resilience score (0-100)'
        value: ${{ jobs.terraform-guard.outputs.resilience-score }}
      baseline-score:
        description: 'Pre-change baseline resilience score (0-100)'
        value: ${{ jobs.terraform-guard.outputs.baseline-score }}
      passed:
        description: 'Whether the guard check passed'
        value: ${{ jobs.terraform-guard.outputs.passed }}
      recommendation:
        description: 'Recommendation: safe | review | high-risk'
        value: ${{ jobs.terraform-guard.outputs.recommendation }}

  # Allow direct trigger for testing
  workflow_dispatch:
    inputs:
      terraform-dir:
        description: 'Directory containing Terraform configuration'
        required: false
        default: '.'
      min-score:
        description: 'Minimum resilience score threshold'
        required: false
        default: '60'

jobs:
  terraform-guard:
    name: Terraform Resilience Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    outputs:
      resilience-score: ${{ steps.analyze.outputs.resilience_score }}
      baseline-score: ${{ steps.load-baseline.outputs.baseline_score }}
      passed: ${{ steps.gate.outputs.passed }}
      recommendation: ${{ steps.analyze.outputs.recommendation }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version || '1.7.0' }}
          terraform_wrapper: false
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install FaultRay
        run: |
          if [ -n "${{ inputs.faultray-version }}" ]; then
            pip install "faultray==${{ inputs.faultray-version }}"
          else
            pip install faultray
          fi

      - name: Terraform Init
        id: tf-init
        working-directory: ${{ inputs.terraform-dir || '.' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: terraform init -input=false

      - name: Download baseline artifact
        id: baseline-artifact
        uses: actions/download-artifact@v4
        with:
          name: faultray-terraform-baseline
          path: /tmp/baseline-artifact
        continue-on-error: true

      - name: Load baseline score
        id: load-baseline
        run: |
          BASELINE_SCORE="N/A"
          if [ -f /tmp/baseline-artifact/baseline.json ]; then
            BASELINE_SCORE=$(python3 -c "
          import json
          try:
            d = json.load(open('/tmp/baseline-artifact/baseline.json'))
            print(d.get('resilience_score', 'N/A'))
          except Exception:
            print('N/A')
          " 2>/dev/null || echo "N/A")
          fi
          echo "baseline_score=$BASELINE_SCORE" >> $GITHUB_OUTPUT
          echo "Baseline resilience score: $BASELINE_SCORE"

      - name: Terraform Plan
        id: tf-plan
        working-directory: ${{ inputs.terraform-dir || '.' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: |
          terraform plan -out=plan.out -input=false 2>&1 | tee /tmp/tf-plan-output.txt
          terraform show -json plan.out > /tmp/plan.json
          echo "Terraform plan generated successfully."

      - name: Analyze resilience impact
        id: analyze
        run: |
          set -euo pipefail

          PLAN_FILE="/tmp/plan.json"
          RESULTS_FILE="/tmp/faultray-tf-results.json"

          # Run FaultRay terraform check (non-fatal; we parse results ourselves)
          faultray tf-check "$PLAN_FILE" --json > "$RESULTS_FILE" 2>/tmp/faultray-tf-stderr.txt || true

          if [ -s /tmp/faultray-tf-stderr.txt ]; then
            echo "--- FaultRay output ---"
            cat /tmp/faultray-tf-stderr.txt
            echo "-----------------------"
          fi

          # Parse JSON and emit step outputs
          python3 << 'PYEOF'
          import json, sys, os

          out = os.environ.get("GITHUB_OUTPUT", "/dev/null")
          try:
            r = json.load(open("/tmp/faultray-tf-results.json"))
          except Exception as e:
            print(f"Warning: could not parse results: {e}", file=sys.stderr)
            r = {}

          score    = r.get("resilience_score", 0)
          rec      = r.get("recommendation", "review")
          new_r    = r.get("new_risks", [])
          res_r    = r.get("resolved_risks", [])
          changes  = r.get("resource_changes", {})
          critical = r.get("critical_count", 0)
          warnings = r.get("warning_count", 0)

          with open(out, "a") as f:
            f.write(f"resilience_score={score}\n")
            f.write(f"recommendation={rec}\n")
            f.write(f"new_risks_count={len(new_r)}\n")
            f.write(f"resolved_risks_count={len(res_r)}\n")
            f.write(f"critical_count={critical}\n")
            f.write(f"warning_count={warnings}\n")
            f.write(f"added={changes.get('added', 0)}\n")
            f.write(f"changed={changes.get('changed', 0)}\n")
            f.write(f"destroyed={changes.get('destroyed', 0)}\n")

          print(f"Resilience score:  {score}/100")
          print(f"Recommendation:    {rec}")
          print(f"New risks:         {len(new_r)}")
          print(f"Risks resolved:    {len(res_r)}")
          print(f"Critical:          {critical}")
          PYEOF

      - name: Evaluate gate
        id: gate
        run: |
          set -euo pipefail

          SCORE="${{ steps.analyze.outputs.resilience_score }}"
          BASELINE="${{ steps.load-baseline.outputs.baseline_score }}"
          MIN_SCORE="${{ inputs.min-score || 60 }}"
          FAIL_ON_REGRESSION="${{ inputs.fail-on-regression || 'true' }}"
          CRITICAL="${{ steps.analyze.outputs.critical_count }}"

          PASSED=true
          FAIL_MSG=""

          if python3 -c "import sys; sys.exit(0 if float('$SCORE') < float('$MIN_SCORE') else 1)" 2>/dev/null; then
            PASSED=false
            FAIL_MSG="Score ${SCORE}/100 is below minimum threshold of ${MIN_SCORE}"
          fi

          if [ "$CRITICAL" -gt 0 ]; then
            PASSED=false
            SEP=""
            [ -n "$FAIL_MSG" ] && SEP="; "
            FAIL_MSG="${FAIL_MSG}${SEP}${CRITICAL} critical resilience issue(s) found"
          fi

          if [ "$FAIL_ON_REGRESSION" = "true" ] && [ "$BASELINE" != "N/A" ]; then
            REGRESSION=$(python3 -c "
          try:
            print('true' if float('$SCORE') < float('$BASELINE') - 5 else 'false')
          except Exception:
            print('false')
          " 2>/dev/null || echo "false")
            if [ "$REGRESSION" = "true" ]; then
              PASSED=false
              SEP=""
              [ -n "$FAIL_MSG" ] && SEP="; "
              FAIL_MSG="${FAIL_MSG}${SEP}Score regressed from ${BASELINE} to ${SCORE}"
            fi
          fi

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "fail_reason=$FAIL_MSG" >> $GITHUB_OUTPUT
          echo "Guard result: passed=$PASSED"
          [ -n "$FAIL_MSG" ] && echo "Reason: $FAIL_MSG" || true

      - name: Post PR comment
        if: >
          (inputs.comment-on-pr == true || inputs.comment-on-pr == 'true') &&
          github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const score      = parseInt('${{ steps.analyze.outputs.resilience_score }}') || 0;
            const baseline   = '${{ steps.load-baseline.outputs.baseline_score }}';
            const passed     = '${{ steps.gate.outputs.passed }}' === 'true';
            const failReason = '${{ steps.gate.outputs.fail_reason }}';
            const recommend  = '${{ steps.analyze.outputs.recommendation }}' || 'review';
            const newRisks   = parseInt('${{ steps.analyze.outputs.new_risks_count }}') || 0;
            const resolved   = parseInt('${{ steps.analyze.outputs.resolved_risks_count }}') || 0;
            const critical   = parseInt('${{ steps.analyze.outputs.critical_count }}') || 0;
            const warnings   = parseInt('${{ steps.analyze.outputs.warning_count }}') || 0;
            const added      = parseInt('${{ steps.analyze.outputs.added }}') || 0;
            const changed    = parseInt('${{ steps.analyze.outputs.changed }}') || 0;
            const destroyed  = parseInt('${{ steps.analyze.outputs.destroyed }}') || 0;
            const minScore   = parseInt('${{ inputs.min-score }}') || 60;
            const tfDir      = '${{ inputs.terraform-dir }}' || '.';

            const scoreEmoji = score >= 80 ? '\u{1F7E2}' : score >= 60 ? '\u{1F7E1}' : '\u{1F534}';
            const scoreTrend = (() => {
              if (baseline === 'N/A') return '';
              const b = parseFloat(baseline);
              const diff = score - b;
              if (Math.abs(diff) < 1) return ' *(unchanged vs baseline)*';
              const arrow = diff > 0 ? '\u25B2' : '\u25BC';
              const sign  = diff > 0 ? '+' : '';
              return ' *(' + arrow + ' ' + sign + diff.toFixed(0) + ' vs baseline ' + b + ')*';
            })();

            const statusBadge = passed
              ? '### \u2705 PASS \u2014 Resilience check succeeded'
              : '### \u274C FAIL \u2014 Resilience check failed';

            const recommendMap = {
              'safe':        '\u2705 **Safe to merge** \u2014 no significant resilience impact detected.',
              'review':      '\u26A0\uFE0F **Review recommended** \u2014 some resilience concerns warrant attention.',
              'high-risk':   '\u{1F6A8} **High risk** \u2014 do not merge without explicit infrastructure owner sign-off.',
            };
            const recommendText = recommendMap[recommend] || recommendMap['review'];

            let newRiskRows  = '';
            let resolvedRows = '';
            try {
              const raw = JSON.parse(fs.readFileSync('/tmp/faultray-tf-results.json', 'utf8'));
              if (Array.isArray(raw.new_risks) && raw.new_risks.length > 0) {
                newRiskRows = raw.new_risks.map(r =>
                  '| `' + (r.resource || '\u2014') + '` | ' + (r.severity || '\u2014') + ' | ' + (r.description || '\u2014') + ' |'
                ).join('\n');
              }
              if (Array.isArray(raw.resolved_risks) && raw.resolved_risks.length > 0) {
                resolvedRows = raw.resolved_risks.map(r =>
                  '| `' + (r.resource || '\u2014') + '` | ' + (r.description || '\u2014') + ' |'
                ).join('\n');
              }
            } catch (e) { /* results absent */ }

            const baselineDisplay = baseline === 'N/A'
              ? '*first run \u2014 no baseline yet*'
              : baseline + ' / 100';

            let body = '';
            body += '## \uD83D\uDEE1\uFE0F FaultRay Terraform Guard\n\n';
            body += statusBadge + '\n\n';
            body += '#### Resilience Score\n\n';
            body += '| | |\n|---|---|\n';
            body += '| **Score** | ' + scoreEmoji + ' **' + score + ' / 100**' + scoreTrend + ' |\n';
            body += '| **Threshold** | ' + minScore + ' / 100 |\n';
            body += '| **Baseline** | ' + baselineDisplay + ' |\n\n';
            body += '#### Infrastructure Changes\n\n';
            body += '| Change type | Count |\n|---|---|\n';
            body += '| \u2795 Resources added | `' + added + '` |\n';
            body += '| \u270F\uFE0F Resources modified | `' + changed + '` |\n';
            body += '| \uD83D\uDDD1\uFE0F Resources destroyed | `' + destroyed + '` |\n\n';
            body += '#### Resilience Findings\n\n';
            body += '| Severity | Count |\n|---|---|\n';
            body += '| \uD83D\uDD34 Critical | `' + critical + '` |\n';
            body += '| \uD83D\uDFE1 Warnings | `' + warnings + '` |\n';
            body += '| \uD83C\uDD95 New risks introduced | `' + newRisks + '` |\n';
            body += '| \u2714\uFE0F Risks resolved | `' + resolved + '` |\n\n';

            if (newRiskRows) {
              body += '<details>\n<summary>New risks introduced (' + newRisks + ')</summary>\n\n';
              body += '| Resource | Severity | Description |\n|---|---|---|\n' + newRiskRows + '\n\n</details>\n\n';
            }
            if (resolvedRows) {
              body += '<details>\n<summary>Risks resolved by this change (' + resolved + ')</summary>\n\n';
              body += '| Resource | Description |\n|---|---|\n' + resolvedRows + '\n\n</details>\n\n';
            }

            body += '#### Recommendation\n\n' + recommendText + '\n\n';

            if (!passed && failReason) {
              body += '> [!CAUTION]\n> ' + failReason + '\n\n';
            }

            body += '---\n*Terraform directory: `' + tfDir + '`'
                  + ' \u2022 Analyzed by [FaultRay](https://github.com/faultray/faultray) Terraform Guard'
                  + ' \u2022 [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*';

            const MARKER = 'FaultRay Terraform Guard';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info('Updated existing PR comment id: ' + existing.id);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              core.info('Created new PR comment.');
            }

      - name: Save baseline artifact (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p /tmp/baseline-out
          python3 -c "
          import json
          try:
            r = json.load(open('/tmp/faultray-tf-results.json'))
          except Exception:
            r = {'resilience_score': 0}
          json.dump({'resilience_score': r.get('resilience_score', 0)}, open('/tmp/baseline-out/baseline.json', 'w'))
          print('Baseline saved:', r.get('resilience_score', 0))
          "

      - name: Upload baseline artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: faultray-terraform-baseline
          path: /tmp/baseline-out/baseline.json
          retention-days: 90

      - name: Fail check if guard did not pass
        if: steps.gate.outputs.passed != 'true'
        run: |
          echo "::error::FaultRay Terraform Guard FAILED: ${{ steps.gate.outputs.fail_reason }}"
          exit 1
