name: InfraSim Infrastructure Check

on:
  pull_request:
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - '**/terraform/**'
      - '**/*.tf'
      - '**/infrasim*.yaml'

permissions:
  pull-requests: write
  contents: read

jobs:
  infrasim-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install InfraSim
        run: pip install infrasim  # or pip install -e . if in same repo

      - name: Find infrastructure YAML files
        id: find-yaml
        run: |
          # Find InfraSim YAML files in the PR
          FILES=$(find . -name 'infrasim*.yaml' -o -name 'infrasim*.yml' -o -name 'infrastructure*.yaml' | head -5)
          if [ -z "$FILES" ]; then
            echo "No InfraSim YAML files found"
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "found=true" >> $GITHUB_OUTPUT
            echo "files=$FILES" >> $GITHUB_OUTPUT
            echo "first_file=$(echo $FILES | head -1)" >> $GITHUB_OUTPUT
          fi

      - name: Run InfraSim simulation
        if: steps.find-yaml.outputs.found == 'true'
        run: |
          FILE="${{ steps.find-yaml.outputs.first_file }}"
          echo "Running InfraSim on $FILE..."

          # Run simulation with JSON output
          infrasim load "$FILE"
          infrasim simulate --json infrasim-results.json 2>&1 | tee infrasim-output.txt

          # Run AI analysis
          infrasim analyze "$FILE" --json 2>&1 | tee infrasim-analysis.txt

      - name: Comment PR with results
        if: steps.find-yaml.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let output = '';
            try { output = fs.readFileSync('infrasim-output.txt', 'utf8'); } catch(e) {}
            let analysis = '';
            try { analysis = fs.readFileSync('infrasim-analysis.txt', 'utf8'); } catch(e) {}

            // Parse key metrics from output
            const lines = output.split('\n');
            const resilienceLine = lines.find(l => l.includes('Resilience'));
            const criticalLine = lines.find(l => l.includes('CRITICAL') || l.includes('Critical'));

            const body = `## InfraSim Chaos Simulation Report

            ${resilienceLine ? '**' + resilienceLine.trim() + '**' : ''}
            ${criticalLine ? criticalLine.trim() : ''}

            <details>
            <summary>Full Simulation Output</summary>

            \`\`\`
            ${output.substring(0, 3000)}
            \`\`\`
            </details>

            <details>
            <summary>AI Analysis & Recommendations</summary>

            \`\`\`
            ${analysis.substring(0, 3000)}
            \`\`\`
            </details>

            ---
            *Powered by [InfraSim](https://github.com/mattyopon/infrasim) -- Zero-Risk Infrastructure Chaos Simulation*`;

            // Find existing InfraSim comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.body.includes('InfraSim Chaos Simulation Report'));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
