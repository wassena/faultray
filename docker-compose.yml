services:
  # Web dashboard mode
  faultray:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FAULTRAY_DB_PATH=/data/faultray.db
      - FAULTRAY_CORS_ORIGINS=*
    volumes:
      - faultray-data:/data
      - ./examples:/app/examples:ro
    command: ["faultray", "serve", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Demo mode (loads sample infra + opens dashboard)
  demo:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FAULTRAY_DB_PATH=/data/faultray.db
      - FAULTRAY_CORS_ORIGINS=*
    volumes:
      - faultray-data:/data
    command: ["faultray", "demo", "--web"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - demo

  # CLI mode (for running simulations)
  cli:
    build: .
    volumes:
      - faultray-data:/data
      - ./examples:/app/examples
      - ./reports:/app/reports
    entrypoint: ["faultray"]
    command: ["--help"]
    profiles:
      - cli

volumes:
  faultray-data:
